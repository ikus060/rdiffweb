<!DOCTYPE html>
<html lang="{{ get_translation().locale }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
      {% block title %}
      {% endblock title %}
    </title>
  </head>
  <body style="margin:0;
               padding:0;
               background-color:#f4f6f9;
               font-family:-apple-system,'{{ font_family }}','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
               font-size:14px;
               color:#212529">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table width="680"
                 cellpadding="0"
                 cellspacing="0"
                 style="background:#ffffff;
                        border-radius:8px;
                        border:1px solid #dee2e6;
                        overflow:hidden">
            <!-- HEADER -->
            <tr>
              <td style="background:{{ navbar_color }};padding:20px 28px;">
                <table width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td>
                      <div style="font-size:20px;font-weight:700;">
                        <img src="{{ url_for("/header_logo") }}"
                             alt="{{ header_name }}"
                             height="36" />
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <!-- BODY -->
            <tr>
              <td style="padding:20px 28px;">
                {% block content %}
                {% endblock content %}
              </td>
            </tr>
            <!-- FOOTER -->
            <tr>
              <td style="background:#f8f9fa;
                         padding:16px 28px;
                         text-align:center;
                         font-size:11px;
                         color:#adb5bd;
                         border-top:1px solid #e9ecef">
                <p style="margin:0 0 6px;">
                  {% trans %}You received this email to let you know about important changes to your {{ header_name }} account.{% endtrans %}
                </p>
                <p style="margin:0;color:#ced4da;">{% trans %}Powered by{% endtrans %} {{ footer_name }} © 2026</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
